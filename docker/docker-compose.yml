# EIC Docker image chain:  ubuntu-root  ->  eic-base  ->  eic-full
#
# This file works with BOTH docker compose and docker buildx bake:
#
#   docker compose build                          Build all (compose)
#   docker buildx bake                            Build all (bake)
#
#   docker compose build eic-base                 Build one + deps
#   docker buildx bake eic-base                   Build one + deps
#
#   BUILD_THREADS=24 docker compose build          Custom threads
#   BUILD_THREADS=24 docker buildx bake            Custom threads
#
#   docker compose build --no-cache                No cache
#   docker buildx bake --no-cache                  No cache
#
#   docker compose build --push                    Build + push
#   docker buildx bake --push                      Build + push
#
#   IMAGE_TAG=v1.0 docker compose build            Custom tag
#   IMAGE_TAG=v1.0 docker buildx bake              Custom tag
#
#   docker buildx bake --print                     Dry run (bake only)
#
#   docker compose run --rm eic-full               Run a container

x-common-build: &common-build
  args:
    BUILD_THREADS: ${BUILD_THREADS:-8}
    CXX_STANDARD: ${CXX_STANDARD:-20}

services:
  ubuntu-root:
    image: eicdev/ubuntu-root:${IMAGE_TAG:-latest}
    build:
      context: ./ubuntu-root
      <<: *common-build

  eic-base:
    image: eicdev/eic-base:${IMAGE_TAG:-latest}
    build:
      context: ./eic-base
      <<: *common-build
    depends_on:
      - ubuntu-root

  eic-full:
    image: eicdev/eic-full:${IMAGE_TAG:-latest}
    build:
      context: ./eic-full
      <<: *common-build
    depends_on:
      - eic-base
