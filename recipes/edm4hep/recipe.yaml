# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.99.4"
  tag: "v00-99-04"

package:
  name: eic-edm4hep
  version: ${{ version }}

source:
  git: https://github.com/key4hep/EDM4hep.git
  tag: ${{ tag }}
  depth: 1

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir build && cd build
        - cmake ${SRC_DIR}
            -GNinja
            -DCMAKE_INSTALL_PREFIX=${PREFIX}
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_STANDARD=20
            -DBUILD_TESTING=OFF
        - ninja -j${CPU_COUNT}
        - ninja install

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.22
    - ninja
  host:
    - root_base >=6.38
    - eic-podio >=1.6
    - python
    - catch2 >=3.4
  run:
    - root_base >=6.38
    - eic-podio >=1.6
    - python

about:
  homepage: https://github.com/key4hep/EDM4hep
  license: Apache-2.0
  summary: Common event data model for HEP experiments
  repository: https://github.com/key4hep/EDM4hep
