# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.2.0"
  tag: "v1.2.0"

package:
  name: eic-algorithms
  version: ${{ version }}

source:
  git: https://github.com/eic/algorithms.git
  tag: ${{ tag }}
  depth: 1

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir build && cd build
        - cmake ${SRC_DIR}
            -GNinja
            -DCMAKE_INSTALL_PREFIX=${PREFIX}
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_STANDARD=20
            -DBUILD_TESTING=OFF
        - ninja -j${CPU_COUNT}
        - ninja install

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.22
    - ninja
  host:
    - root_base >=6.38
    - eic-dd4hep >=1.35
    - eic-podio >=1.6
    - eic-edm4hep >=0.99.4
    - eic-edm4eic >=8.8.0
    - eic-acts >=44.4.0
    - eigen >=3.4
    - spdlog >=1.15
    - fmt >=11.2
  run:
    - root_base >=6.38
    - eic-dd4hep >=1.35
    - eic-podio >=1.6
    - eic-edm4hep >=0.99.4
    - eic-edm4eic >=8.8.0
    - eic-acts >=44.4.0
    - spdlog >=1.15
    - fmt >=11.2

about:
  homepage: https://github.com/eic/algorithms
  license: LGPL-3.0-or-later
  summary: EIC reconstruction algorithms library
  repository: https://github.com/eic/algorithms
