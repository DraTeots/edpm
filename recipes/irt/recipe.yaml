# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.10"
  tag: "v1.0.10"

package:
  name: eic-irt
  version: ${{ version }}

source:
  git: https://github.com/eic/irt.git
  tag: ${{ tag }}
  depth: 1

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir build && cd build
        - cmake ${SRC_DIR}
            -GNinja
            -DCMAKE_INSTALL_PREFIX=${PREFIX}
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_STANDARD=20
            -DBUILD_TESTING=OFF
        - ninja -j${CPU_COUNT}
        - ninja install

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.22
    - ninja
  host:
    - root_base >=6.38
    - eic-dd4hep >=1.35
  run:
    - root_base >=6.38
    - eic-dd4hep >=1.35

about:
  homepage: https://github.com/eic/irt
  license: LGPL-3.0-or-later
  summary: Indirect Ray Tracing library for RICH detector reconstruction
  repository: https://github.com/eic/irt
