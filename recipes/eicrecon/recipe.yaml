# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.35.2"
  tag: "v1.35.2"

package:
  name: eic-eicrecon
  version: ${{ version }}

source:
  git: https://github.com/eic/EICrecon.git
  tag: ${{ tag }}
  depth: 1

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir build && cd build
        - cmake ${SRC_DIR}
            -GNinja
            -DCMAKE_INSTALL_PREFIX=${PREFIX}
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_STANDARD=20
            -DBUILD_TESTING=OFF
        - ninja -j${CPU_COUNT}
        - ninja install
        # Install activation scripts
        - mkdir -p ${PREFIX}/etc/conda/activate.d
        - mkdir -p ${PREFIX}/etc/conda/deactivate.d
        - cp ${RECIPE_DIR}/activate.sh ${PREFIX}/etc/conda/activate.d/eicrecon-activate.sh
        - cp ${RECIPE_DIR}/deactivate.sh ${PREFIX}/etc/conda/deactivate.d/eicrecon-deactivate.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.22
    - ninja
  host:
    - root_base >=6.38
    - geant4 >=11.3
    - eic-jana2 >=2.4.3
    - eic-dd4hep >=1.35
    - eic-podio >=1.6
    - eic-edm4hep >=0.99.4
    - eic-edm4eic >=8.8.0
    - eic-acts >=44.4.0
    - eic-algorithms >=1.2.0
    - eic-irt >=1.0.10
    - eigen >=3.4
    - fmt >=11.2
    - spdlog >=1.15
    - nlohmann_json >=3.11
    - python
  run:
    - root_base >=6.38
    - geant4 >=11.3
    - eic-jana2 >=2.4.3
    - eic-dd4hep >=1.35
    - eic-podio >=1.6
    - eic-edm4hep >=0.99.4
    - eic-edm4eic >=8.8.0
    - eic-acts >=44.4.0
    - eic-algorithms >=1.2.0
    - eic-irt >=1.0.10
    - python

about:
  homepage: https://github.com/eic/EICrecon
  license: LGPL-3.0-or-later
  summary: EIC reconstruction framework based on JANA2
  repository: https://github.com/eic/EICrecon
