# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "25.02.0"
  tag: "25.02.0"

package:
  name: eic-epic
  version: ${{ version }}

source:
  git: https://github.com/eic/epic.git
  tag: ${{ tag }}
  depth: 1

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir build && cd build
        - cmake ${SRC_DIR}
            -GNinja
            -DCMAKE_INSTALL_PREFIX=${PREFIX}
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CXX_STANDARD=20
            -DBUILD_TESTING=OFF
        - ninja -j${CPU_COUNT}
        - ninja install
        # Install activation scripts
        - mkdir -p ${PREFIX}/etc/conda/activate.d
        - mkdir -p ${PREFIX}/etc/conda/deactivate.d
        - cp ${RECIPE_DIR}/activate.sh ${PREFIX}/etc/conda/activate.d/epic-activate.sh
        - cp ${RECIPE_DIR}/deactivate.sh ${PREFIX}/etc/conda/deactivate.d/epic-deactivate.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.22
    - ninja
  host:
    - root_base >=6.38
    - eic-dd4hep >=1.35
    - eic-acts >=44.4.0
    - fmt >=11.2
  run:
    - root_base >=6.38
    - eic-dd4hep >=1.35

about:
  homepage: https://github.com/eic/epic
  license: LGPL-3.0-or-later
  summary: ePIC detector geometry for the Electron-Ion Collider
  repository: https://github.com/eic/epic
