name: Build EIC Conda Packages

on:
  push:
    paths:
      - 'recipes/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Rebuild all packages'
        type: boolean
        default: false

env:
  CHANNEL_URL: "oci://ghcr.io/eic/eic-conda"

jobs:
  # ============================================================
  # Layer 0: packages that only depend on conda-forge
  # ============================================================
  build-podio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build podio
        run: |
          rattler-build build \
            --recipe recipes/podio/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-podio
          path: output/**/*.conda

  build-jana2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build jana2
        run: |
          rattler-build build \
            --recipe recipes/jana2/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-jana2
          path: output/**/*.conda

  # ============================================================
  # Layer 0b: edm4hep needs podio, dd4hep needs both
  # ============================================================
  build-edm4hep:
    needs: [build-podio]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pkg-podio
          path: local-channel/
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build edm4hep
        run: |
          rattler-build build \
            --recipe recipes/edm4hep/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-edm4hep
          path: output/**/*.conda

  build-dd4hep:
    needs: [build-podio, build-edm4hep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build dd4hep
        run: |
          rattler-build build \
            --recipe recipes/dd4hep/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-dd4hep
          path: output/**/*.conda

  # ============================================================
  # Layer 1: packages depending on dd4hep or podio+edm4hep
  # ============================================================
  build-edm4eic:
    needs: [build-podio, build-edm4hep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build edm4eic
        run: |
          rattler-build build \
            --recipe recipes/edm4eic/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-edm4eic
          path: output/**/*.conda

  build-acts:
    needs: [build-dd4hep, build-podio, build-edm4hep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build acts
        run: |
          rattler-build build \
            --recipe recipes/acts/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-acts
          path: output/**/*.conda

  build-irt:
    needs: [build-dd4hep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build irt
        run: |
          rattler-build build \
            --recipe recipes/irt/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-irt
          path: output/**/*.conda

  build-epic:
    needs: [build-dd4hep, build-acts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build epic
        run: |
          rattler-build build \
            --recipe recipes/epic/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-epic
          path: output/**/*.conda

  build-npsim:
    needs: [build-dd4hep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build npsim
        run: |
          rattler-build build \
            --recipe recipes/npsim/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-npsim
          path: output/**/*.conda

  # ============================================================
  # Layer 2: algorithms (needs acts, dd4hep, edm4eic)
  # ============================================================
  build-algorithms:
    needs: [build-acts, build-dd4hep, build-edm4eic, build-edm4hep, build-podio]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build algorithms
        run: |
          rattler-build build \
            --recipe recipes/algorithms/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-algorithms
          path: output/**/*.conda

  # ============================================================
  # Layer 3: eicrecon (top of the stack)
  # ============================================================
  build-eicrecon:
    needs: [build-jana2, build-dd4hep, build-acts, build-edm4eic, build-edm4hep, build-podio, build-algorithms, build-irt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: local-channel/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build eicrecon
        run: |
          rattler-build build \
            --recipe recipes/eicrecon/ \
            --channel local-channel/ \
            --channel conda-forge \
            --output-dir output/
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-eicrecon
          path: output/**/*.conda

  # ============================================================
  # Upload all packages to ghcr.io OCI registry
  # ============================================================
  publish:
    needs:
      - build-podio
      - build-edm4hep
      - build-dd4hep
      - build-edm4eic
      - build-acts
      - build-jana2
      - build-irt
      - build-algorithms
      - build-epic
      - build-npsim
      - build-eicrecon
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: packages/
          merge-multiple: true
      - name: Install rattler-build
        run: |
          curl -SsL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl" -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Upload to ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in packages/**/*.conda; do
            echo "Uploading $(basename $pkg)..."
            rattler-build upload ghcr \
              "$pkg" \
              --owner eic \
              --repo eic-conda \
              --token "${GITHUB_TOKEN}"
          done
